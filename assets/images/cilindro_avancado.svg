<svg xmlns="http://www.w3.org/2000/svg"
     width="1400"
     height="300"
     viewBox="0 0 1400 300"
     role="img"
     aria-labelledby="title desc">
  <title id="title">Cilindro pneumático avançado</title>
  <desc id="desc">
    Ilustração vetorial de um cilindro pneumático cinza,
    visto de lado, com a haste avançada.
  </desc>

  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6f6f6"/>
      <stop offset="20%" stop-color="#cfcfcf"/>
      <stop offset="52%" stop-color="#f1f1f1"/>
      <stop offset="82%" stop-color="#b9b9b9"/>
      <stop offset="100%" stop-color="#e7e7e7"/>
    </linearGradient>

    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e5e5e5"/>
      <stop offset="45%" stop-color="#bdbdbd"/>
      <stop offset="100%" stop-color="#d8d8d8"/>
    </linearGradient>

    <linearGradient id="rod" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="45%" stop-color="#b7b7b7"/>
      <stop offset="100%" stop-color="#eeeeee"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="5"
                    flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- sombra suave -->
  <ellipse cx="670" cy="244" rx="560" ry="18"
           fill="#000000" opacity="0.08"/>

  <g filter="url(#shadow)" stroke="#202020" stroke-width="6"
     stroke-linejoin="round" stroke-linecap="round">

    <!-- olhal traseiro -->
    <path d="M75 112
             H170
             V188
             H75
             C40 188 25 169 25 150
             C25 131 40 112 75 112 Z"
          fill="url(#cap)"/>
    <circle cx="77" cy="150" r="24" fill="#ffffff"/>

    <!-- corpo principal -->
    <rect x="205" y="85" width="720" height="130" rx="12"
          fill="url(#metal)"/>

    <!-- tirantes -->
    <rect x="215" y="61" width="700" height="18" rx="9"
          fill="url(#rod)"/>
    <rect x="215" y="221" width="700" height="18" rx="9"
          fill="url(#rod)"/>

    <!-- tampa traseira -->
    <rect x="160" y="48" width="100" height="204" rx="10"
          fill="url(#cap)"/>

    <!-- tampa dianteira -->
    <rect x="900" y="48" width="110" height="204" rx="10"
          fill="url(#cap)"/>

    <!-- porta traseira -->
    <circle cx="211" cy="150" r="30" fill="#d3d3d3"/>
    <circle cx="211" cy="150" r="14" fill="#1f1f1f"/>
    <circle cx="211" cy="150" r="7" fill="#555555"/>

    <!-- porta dianteira -->
    <circle cx="955" cy="150" r="30" fill="#d3d3d3"/>
    <circle cx="955" cy="150" r="14" fill="#1f1f1f"/>
    <circle cx="955" cy="150" r="7" fill="#555555"/>

    <!-- guia da haste -->
    <rect x="1010" y="115" width="55" height="70" rx="8"
          fill="url(#cap)"/>
    <rect x="1060" y="125" width="16" height="50" rx="4"
          fill="#4b4b4b"/>

    <!-- haste longa: estado avançado -->
    <rect x="1076" y="133" width="190" height="34" rx="4"
          fill="url(#rod)"/>

    <!-- terminal da haste -->
    <path d="M1266 116
             H1306
             C1323 116 1334 131 1334 150
             C1334 169 1323 184 1306 184
             H1266 Z"
          fill="url(#cap)"/>
    <circle cx="1302" cy="150" r="19" fill="#ffffff"/>
  </g>
</svg>
